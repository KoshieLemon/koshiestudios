<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Krowange AI - Discord Bot Setup</title>

  <!-- absolute paths, served from your site root -->
  <link rel="stylesheet" href="/style.css" />
  <style>
    .button-container { text-align: center; margin-top: 2em; }
    .cta-button {
      display: inline-block;
      padding: 1em 2em;
      background-color: #5865F2;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1.1em;
      transition: background-color 0.3s;
    }
    .cta-button:hover { background-color: #4752c4; }
    main.parallax-page .intro { padding: 4em 1em; text-align: center; }
    #debug {
      margin: 2em auto;
      padding: 1em;
      width: 90%; max-width: 600px;
      background: rgba(0,0,0,0.05);
      border: 1px solid #ccc;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <!-- absolute path to your site root header script -->
  <script src="/header.js"></script>

  <main class="parallax-page">
    <section class="intro">
      <h1>Welcome to Krowange AI</h1>
      <p>Start by logging in with Discord:</p>
      <div class="button-container">
        <a id="discord-login-btn" class="cta-button" href="#" disabled>
          Login with Discord
        </a>
      </div>
    </section>
    <div id="debug">⏳ Starting debug...</div>
  </main>

  <script>
    const debug = document.getElementById('debug');
    const btn   = document.getElementById('discord-login-btn');

    // ←–– REPLACE this with your deployed auth server URL:
    const API_BASE = '<AUTH_URL>'; // e.g. https://krowange-auth.up.railway.app

    debug.textContent = 
      `▶️ Origin: ${window.location.origin}\n` +
      `▶️ Page Path: ${window.location.pathname}\n\n`;

    // 1) Quick HEAD-check for your assets & API
    const checks = {
      css:  '/style.css',
      hdr:  '/header.js',
      meta: `${API_BASE}/auth/discord/meta`
    };

    for (const [key, url] of Object.entries(checks)) {
      fetch(url, { method: 'HEAD' })
        .then(res => debug.textContent += `✔️ HEAD ${key}: ${url} → ${res.status}\n`)
        .catch(err =>  debug.textContent += `❌ HEAD ${key}: ${url} → ${err}\n`);
    }

    // 2) Fetch the OAuth metadata and enable the button
    setTimeout(() => {
      debug.textContent += `\n⏳ Fetching OAuth meta from ${checks.meta}\n`;
      fetch(checks.meta)
        .then(res => {
          debug.textContent += `✔️ GET meta status: ${res.status}\n`;
          return res.json();
        })
        .then(({ client_id, redirect_uri }) => {
          debug.textContent += 
            `✔️ Parsed meta:\n   client_id: ${client_id}\n   redirect_uri: ${redirect_uri}\n`;

          const base   = 'https://discord.com/oauth2/authorize';
          const params = new URLSearchParams({
            client_id,
            redirect_uri,
            response_type: 'code',
            scope: 'identify guilds'
          });

          btn.href = `${base}?${params.toString()}`;
          btn.removeAttribute('disabled');
          debug.textContent += `✔️ Button href set → ${btn.href}\n`;
        })
        .catch(err => {
          debug.textContent += `❌ Error fetching/parsing meta: ${err}\n`;
        });
    }, 300);
  </script>
</body>
</html>
